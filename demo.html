<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Demo Nhỏ Gọn</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, system-ui, sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
  }
  .card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    padding: 40px;
    border-radius: 16px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    max-width: 420px;
    width: 90%;
  }
  h1 { margin-bottom: 12px; }
  p { opacity: 0.9; margin-bottom: 24px; }
  button {
    background: #fff;
    color: #667eea;
    border: none;
    padding: 12px 28px;
    border-radius: 999px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s;
  }
  button:hover { transform: scale(1.05); }
  #counter { font-size: 48px; margin: 16px 0; font-weight: bold; }
</style>
</head>
<body>
  <div class="card">
    <h1>Xin chào 👋</h1>
    <p>Trang demo nhỏ gọn bằng HTML/CSS/JS</p>
    <div id="counter">0</div>
    <button onclick="document.getElementById('counter').innerText = ++count">
      Bấm vào tôi
    </button>
  </div>
  <script>
    let count = 0;
  </script>
</body>
</html>
