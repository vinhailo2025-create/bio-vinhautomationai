<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vinh Automation AI — Personal Bio</title>
<meta name="description" content="Tối ưu hóa quy trình cá nhân & doanh nghiệp với AI Automation | Affiliate AI | Reup | AI | Automation" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:#05060d;color:#e7e9f3;min-height:100vh;line-height:1.55;overflow-x:hidden;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  img{max-width:100%;display:block}

  .bg-layer{position:fixed;inset:0;z-index:-2;background:radial-gradient(1200px 700px at 15% -10%, rgba(138,43,226,.28), transparent 60%),radial-gradient(900px 600px at 110% 10%, rgba(0,255,255,.14), transparent 60%),radial-gradient(800px 500px at 50% 120%, rgba(255,215,0,.10), transparent 60%),linear-gradient(180deg,#05060d 0%, #070818 100%)}
  .bg-grid{position:fixed;inset:0;z-index:-1;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.045) 1px, transparent 1px),linear-gradient(90deg, rgba(255,255,255,.045) 1px, transparent 1px),radial-gradient(rgba(255,255,255,.08) 1px, transparent 1px);background-size: 60px 60px, 60px 60px, 22px 22px;mask-image: radial-gradient(ellipse at center, rgba(0,0,0,.9) 20%, transparent 80%);-webkit-mask-image: radial-gradient(ellipse at center, rgba(0,0,0,.9) 20%, transparent 80%)}

  .wrap{max-width:720px;margin:0 auto;padding:56px 20px 80px;position:relative}

  .profile{display:flex;flex-direction:column;align-items:center;text-align:center;gap:14px}
  .avatar{width:124px;height:124px;border-radius:50%;background:conic-gradient(from 180deg, #8A2BE2, #00FFFF, #FFD700, #8A2BE2);padding:3px;box-shadow:0 0 28px rgba(138,43,226,.55),0 0 60px rgba(0,255,255,.18);animation:spin 12s linear infinite}
  .avatar-inner{width:100%;height:100%;border-radius:50%;background:#0a0b18;display:flex;align-items:center;justify-content:center;overflow:hidden;font-family:'Space Grotesk',sans-serif;font-size:40px;font-weight:700;color:#fff;letter-spacing:-1px;background-image:radial-gradient(circle at 30% 30%, rgba(138,43,226,.45), transparent 60%),radial-gradient(circle at 70% 70%, rgba(0,255,255,.35), transparent 60%)}
  .avatar-inner img{width:100%;height:100%;object-fit:cover;border-radius:50%}
  @keyframes spin{to{transform:rotate(360deg)}}

  .name{font-family:'Space Grotesk',sans-serif;font-size:clamp(26px, 4.6vw, 34px);font-weight:700;letter-spacing:.3px;background:linear-gradient(90deg,#fff 0%,#d7c7ff 40%,#8A2BE2 70%,#00FFFF 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
  .badge{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;border-radius:999px;background:rgba(0,255,255,.07);border:1px solid rgba(0,255,255,.35);color:#b8faff;font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;box-shadow:0 0 14px rgba(0,255,255,.15) inset}
  .dot{width:8px;height:8px;border-radius:50%;background:#00FFFF;box-shadow:0 0 10px #00FFFF,0 0 20px #00FFFF;animation:pulse 1.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.8)}}
  .desc{max-width:560px;color:#b8bcd4;font-size:15px;padding:2px 8px}

  .section{margin-top:18px;padding:18px 16px;border-radius:22px;border:1px solid rgba(255,255,255,.06);background:linear-gradient(180deg, rgba(255,255,255,.015), rgba(255,255,255,0))}

  .section-title{width:100%;text-align:left;font-family:'Space Grotesk',sans-serif;font-size:13px;letter-spacing:.22em;text-transform:uppercase;color:#9aa0bf;padding:6px 4px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
  .section-title::before{content:"";width:22px;height:2px;border-radius:2px;background:linear-gradient(90deg,#8A2BE2,#00FFFF);box-shadow:0 0 10px #8A2BE2}
  .section-title::after{content:"▾";margin-left:auto;color:#6f7599;font-size:14px;transition:transform .25s ease,color .25s}
  .section.open .section-title::after{transform:rotate(-180deg);color:#fff}

  .section-body{display:grid;grid-template-rows:0fr;transition:grid-template-rows .28s ease}
  .section.open .section-body{grid-template-rows:1fr}
  .section-body > .grid{overflow:hidden;padding-top:14px}

  @media (prefers-reduced-motion: reduce){
    .section-body{transition:none}
    .section-title::after{transition:none}
  }

  .section.support{background:linear-gradient(180deg, rgba(255,215,0,.05), rgba(255,215,0,.01));border-color:rgba(255,215,0,.18)}
  .section.support .section-title{color:#FFE76B}
  .section.support .section-title::before{background:linear-gradient(90deg,#FFD700,#ff9a3c);box-shadow:0 0 10px #FFD700}
  .section.social{background:linear-gradient(180deg, rgba(0,255,255,.04), rgba(0,255,255,.01));border-color:rgba(0,255,255,.18)}
  .section.social .section-title{color:#8ef4ff}
  .section.social .section-title::before{background:linear-gradient(90deg,#00FFFF,#4aa6ff);box-shadow:0 0 10px #00FFFF}
  .section.community{background:linear-gradient(180deg, rgba(138,43,226,.07), rgba(138,43,226,.01));border-color:rgba(138,43,226,.22)}
  .section.community .section-title{color:#d7c7ff}
  .section.community .section-title::before{background:linear-gradient(90deg,#8A2BE2,#ff6ad5);box-shadow:0 0 10px #8A2BE2}

  .grid{display:grid;gap:14px;grid-template-columns:1fr}

  .card{position:relative;display:flex;align-items:center;gap:14px;padding:16px 18px;border-radius:18px;background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);transition:transform .25s ease, border-color .25s ease, box-shadow .25s ease;overflow:hidden;cursor:pointer;isolation:isolate}
  .card:hover{transform:translateY(-3px);border-color:rgba(138,43,226,.55);box-shadow:0 12px 30px rgba(0,0,0,.45),0 0 22px rgba(138,43,226,.35),0 0 50px rgba(138,43,226,.15)}
  .card.yellow-hover:hover{border-color:rgba(255,215,0,.55);box-shadow:0 12px 30px rgba(0,0,0,.45),0 0 22px rgba(255,215,0,.35),0 0 50px rgba(255,215,0,.15)}

  /* Premium gift highlight */
  .gift-card{margin-top:18px;border-radius:22px;padding:16px;border:1px solid rgba(255,215,0,.28);background:linear-gradient(180deg, rgba(255,215,0,.10), rgba(255,215,0,.02));box-shadow:0 12px 34px rgba(0,0,0,.45),0 0 40px rgba(255,215,0,.10);position:relative;overflow:hidden}
  .gift-card::before{content:"";position:absolute;inset:-2px;background:conic-gradient(from 180deg, rgba(255,215,0,.0), rgba(255,215,0,.42), rgba(0,255,255,.18), rgba(255,215,0,.0));filter:blur(14px);opacity:.75;animation:giftSpin 8s linear infinite}
  @keyframes giftSpin{to{transform:rotate(360deg)}}
  .gift-inner{position:relative;display:flex;flex-direction:column;gap:12px}
  .gift-head{display:flex;align-items:center;gap:12px}
  .gift-badge{flex:0 0 auto;width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;background:rgba(255,215,0,.14);border:1px solid rgba(255,215,0,.35);box-shadow:0 0 18px rgba(255,215,0,.18) inset;font-size:22px}
  .gift-title{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#FFE76B;line-height:1.2}
  .gift-sub{font-size:13px;color:#cfd3ea;opacity:.92;margin-top:2px}
  .gift-cta{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px;border-radius:16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,215,0,.18);cursor:pointer;transition:transform .22s ease, box-shadow .22s ease, border-color .22s ease}
  .gift-cta:hover{transform:translateY(-2px);border-color:rgba(255,215,0,.45);box-shadow:0 14px 34px rgba(0,0,0,.45),0 0 26px rgba(255,215,0,.18)}
  .gift-cta .left{display:flex;align-items:center;gap:12px;min-width:0}
  .gift-pill{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#0a0b18;background:linear-gradient(90deg,#FFD700,#ff9a3c);padding:6px 10px;border-radius:999px;white-space:nowrap;box-shadow:0 0 18px rgba(255,215,0,.22)}
  .gift-arrow{color:#fff;opacity:.9}
  .gift-pulse{position:absolute;right:-60px;top:-60px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle, rgba(255,215,0,.35), transparent 60%);animation:giftPulse 2.6s ease-in-out infinite}
  @keyframes giftPulse{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.12);opacity:.35}}

  .icon{flex:0 0 auto;width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;background:rgba(138,43,226,.12);border:1px solid rgba(138,43,226,.3);color:#d7c7ff;box-shadow:0 0 18px rgba(138,43,226,.18) inset;overflow:hidden}
  .icon img{width:100%;height:100%;object-fit:cover}
  .icon.cyan{background:rgba(0,255,255,.08);border-color:rgba(0,255,255,.3);color:#b8faff;box-shadow:0 0 18px rgba(0,255,255,.18) inset}
  .icon.yellow{background:rgba(255,215,0,.08);border-color:rgba(255,215,0,.35);color:#FFE76B;box-shadow:0 0 18px rgba(255,215,0,.18) inset}
  .icon.red{background:rgba(255,70,70,.08);border-color:rgba(255,70,70,.35);color:#ffb3b3}
  .icon.green{background:rgba(0,200,120,.08);border-color:rgba(0,200,120,.35);color:#9bf0c2}
  .icon.blue{background:rgba(66,133,244,.08);border-color:rgba(66,133,244,.35);color:#b5cdfb}
  .icon.pink{background:rgba(255,100,180,.08);border-color:rgba(255,100,180,.35);color:#ffc4df}

  .card-body{display:flex;flex-direction:column;min-width:0}
  .card-title{font-weight:600;font-size:15.5px;color:#fff;letter-spacing:.2px}
  .card-sub{font-size:13px;color:#9aa0bf;margin-top:2px;overflow:hidden;text-overflow:ellipsis}
  .chev{margin-left:auto;color:#6f7599;font-size:14px;transition:transform .25s ease,color .25s}
  .card:hover .chev{transform:translateX(4px);color:#fff}

  .ripple{position:absolute;border-radius:50%;pointer-events:none;transform:scale(0);opacity:.55;background:radial-gradient(circle, rgba(255,255,255,.6), transparent 60%);animation:ripple .7s ease-out forwards;z-index:0}
  @keyframes ripple{to{transform:scale(6);opacity:0}}

  .modal{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;background:rgba(3,4,10,.7);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);padding:20px;opacity:0;transition:opacity .25s ease}
  .modal.open{display:flex;opacity:1}
  .modal-card{width:100%;max-width:380px;background:linear-gradient(180deg, #0f1024, #0a0b18);border:1px solid rgba(138,43,226,.45);border-radius:22px;padding:26px 22px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.6),0 0 40px rgba(138,43,226,.35);transform:translateY(12px) scale(.97);transition:transform .3s ease;position:relative}
  .modal.open .modal-card{transform:translateY(0) scale(1)}
  .modal-close{position:absolute;top:10px;right:12px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;transition:background .2s}
  .modal-close:hover{background:rgba(255,255,255,.12)}
  .modal-title{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;color:#fff;margin-bottom:4px}
  .modal-sub{font-size:13.5px;color:#9aa0bf;margin-bottom:18px}
  .qr-wrap{width:240px;height:240px;margin:0 auto;background:#fff;border-radius:16px;padding:10px;box-shadow:0 0 30px rgba(0,255,255,.2)}
  .qr-wrap img{width:100%;height:100%;object-fit:contain}
  .modal-note{margin-top:14px;font-size:12px;color:#8b90ad;letter-spacing:.04em}

  footer{margin-top:56px;text-align:center;color:#6b7094;font-size:12.5px;letter-spacing:.1em}
  footer span{color:#FFD700}

  .admin-fab{position:fixed;bottom:22px;right:22px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#8A2BE2,#00FFFF);display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;box-shadow:0 8px 24px rgba(138,43,226,.45);z-index:50;transition:transform .2s}
  .admin-fab:hover{transform:scale(1.08)}

  .reveal{opacity:0;transform:translateY(14px);transition:opacity .7s ease, transform .7s ease}
  .reveal.visible{opacity:1;transform:none}

  @media (max-width:560px){.wrap{padding:36px 16px 64px}.avatar{width:108px;height:108px}.avatar-inner{font-size:34px}}
</style>
</head>
<body>
<div class="bg-layer"></div>
<div class="bg-grid"></div>

<main class="wrap">
  <section class="profile reveal">
    <div class="avatar"><div class="avatar-inner" id="avatarInner">VA</div></div>
    <h1 class="name" id="nameEl">Vinh Automation AI</h1>
    <div class="badge"><span class="dot"></span> <span id="badgeEl">AI SYSTEM ACTIVE</span></div>
    <p class="desc" id="descEl"></p>
  </section>

  <div id="giftRoot" class="reveal"></div>

  <div id="sectionsRoot"></div>

  <div id="giftRootBottom" class="reveal"></div>

  <footer class="reveal" id="footerEl"></footer>
</main>

<div class="modal" id="qrModal" role="dialog" aria-modal="true">
  <div class="modal-card">
    <button class="modal-close" id="closeQR" aria-label="Đóng">✕</button>
    <div class="modal-title" id="qrTitle"></div>
    <div class="modal-sub" id="qrSub"></div>
    <div class="qr-wrap"><img id="qrImg" alt="QR Code" /></div>
    <div class="modal-note" id="qrNote"></div>
  </div>
</div>

<a class="admin-fab" href="admin.html" title="Admin">⚙</a>

<script src="data.js"></script>
<script>
  const data = VinhBioData.loadData();

  // Profile
  const avatarInner = document.getElementById('avatarInner');
  if (data.profile.avatarImage) {
    avatarInner.innerHTML = `<img src="${data.profile.avatarImage}" alt="avatar">`;
  } else {
    avatarInner.textContent = data.profile.avatarText || 'VA';
  }
  document.getElementById('nameEl').textContent = data.profile.name;
  document.getElementById('badgeEl').textContent = data.profile.badge;
  document.getElementById('descEl').textContent = data.profile.description;
  document.getElementById('footerEl').textContent = data.footer;

  // QR modal
  document.getElementById('qrTitle').textContent = data.qr.title;
  document.getElementById('qrSub').textContent = data.qr.subtitle;
  document.getElementById('qrImg').src = data.qr.image;
  document.getElementById('qrNote').textContent = data.qr.note;

  // Gift highlight (top + bottom)
  function renderGift(target){
    if (!target) return;
    if (!(data.gift && data.gift.title)) return;

    const wrap = document.createElement('section');
    wrap.className = 'gift-card';

    const inner = document.createElement('div');
    inner.className = 'gift-inner';
    wrap.appendChild(inner);

    const pulse = document.createElement('div');
    pulse.className = 'gift-pulse';
    wrap.appendChild(pulse);

    inner.innerHTML = `
      <div class="gift-head">
        <div class="gift-badge">🎁</div>
        <div style="min-width:0">
          <div class="gift-title"></div>
          <div class="gift-sub"></div>
        </div>
      </div>
      <div class="gift-cta" role="button" tabindex="0">
        <div class="left">
          <div class="gift-pill">Nhận ngay</div>
          <div style="min-width:0;color:#b8bcd4;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">Click để mở quà</div>
        </div>
        <div class="gift-arrow">›</div>
      </div>
    `;

    inner.querySelector('.gift-title').textContent = data.gift.title;
    inner.querySelector('.gift-sub').textContent = data.gift.subtitle || '';

    const cta = inner.querySelector('.gift-cta');
    function openGift(){
      const url = data.gift.link || '#';
      if (url && url !== '#') window.open(url, '_blank', 'noopener');
    }
    cta.addEventListener('click', openGift);
    cta.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') openGift(); });

    target.appendChild(wrap);
  }

  renderGift(document.getElementById('giftRoot'));
  renderGift(document.getElementById('giftRootBottom'));

  // Render sections (collapsible)
  const root = document.getElementById('sectionsRoot');
  let openSection = null;

  function setOpen(sec, open) {
    if (open) {
      if (openSection && openSection !== sec) openSection.classList.remove('open');
      sec.classList.add('open');
      openSection = sec;
    } else {
      sec.classList.remove('open');
      if (openSection === sec) openSection = null;
    }
  }

  data.sections.forEach((section, idx) => {
    const sec = document.createElement('section');
    sec.className = `section reveal ${section.theme || ''}`;

    const title = document.createElement('button');
    title.type = 'button';
    title.className = 'section-title';
    title.textContent = section.title;
    title.setAttribute('aria-expanded', 'false');
    sec.appendChild(title);

    const body = document.createElement('div');
    body.className = 'section-body';

    const grid = document.createElement('div');
    grid.className = 'grid';
    body.appendChild(grid);
    sec.appendChild(body);

    // default: open first section, collapse others
    if (idx === 0) {
      setOpen(sec, true);
      title.setAttribute('aria-expanded', 'true');
    }

    title.addEventListener('click', () => {
      const willOpen = !sec.classList.contains('open');
      setOpen(sec, willOpen);
      title.setAttribute('aria-expanded', willOpen ? 'true' : 'false');
    });

    section.items.forEach(item => {
      const isQR = item.action === 'qr';
      const el = document.createElement(isQR ? 'button' : 'a');
      el.className = 'card' + (item.iconColor === 'yellow' ? ' yellow-hover' : '');
      if (!isQR) {
        el.href = item.link || '#';
        if (item.link && item.link !== '#') { el.target = '_blank'; el.rel = 'noopener'; }
      } else {
        el.type = 'button';
      }

      const icon = document.createElement('div');
      icon.className = 'icon ' + (item.iconColor || '');
      if (item.iconImage) {
        icon.innerHTML = `<img src="${item.iconImage}" alt="">`;
      } else {
        icon.textContent = item.icon || '★';
      }
      el.appendChild(icon);

      const body = document.createElement('div');
      body.className = 'card-body';
      body.innerHTML = `<div class="card-title"></div><div class="card-sub"></div>`;
      body.querySelector('.card-title').textContent = item.title || '';
      body.querySelector('.card-sub').textContent = item.subtitle || '';
      el.appendChild(body);

      const chev = document.createElement('div');
      chev.className = 'chev';
      chev.textContent = '›';
      el.appendChild(chev);

      if (isQR) el.addEventListener('click', openModal);
      el.addEventListener('click', rippleEffect);


      grid.appendChild(el);
    });

    root.appendChild(sec);
  });

  // Make sure only one section is open initially
  openSection = root.querySelector('.section.open');

  // Modal
  const modal = document.getElementById('qrModal');
  function openModal(){ modal.classList.add('open'); document.body.style.overflow='hidden'; }
  function closeModal(){ modal.classList.remove('open'); document.body.style.overflow=''; }
  document.getElementById('closeQR').addEventListener('click', closeModal);
  modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // Ripple
  function rippleEffect(e){
    const card = e.currentTarget;
    const rect = card.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    const r = document.createElement('span');
    r.className = 'ripple';
    r.style.width = r.style.height = size + 'px';
    r.style.left = (e.clientX - rect.left - size/2) + 'px';
    r.style.top  = (e.clientY - rect.top  - size/2) + 'px';
    card.appendChild(r);
    setTimeout(() => r.remove(), 700);
  }

  // Scroll reveal
  const io = new IntersectionObserver(entries => {
    entries.forEach(en => { if (en.isIntersecting) { en.target.classList.add('visible'); io.unobserve(en.target); } });
  }, { threshold: 0.1 });
  document.querySelectorAll('.reveal').forEach(el => io.observe(el));
</script>
</body>
</html>
